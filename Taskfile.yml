version: "3"

vars:
  MIGRATIONS_DIR: ./migrations
  DB_URL: postgres://yusuf:123456@localhost:5434/iwifunni?sslmode=disable

tasks:
  # ----------------------------------
  # Main Targets
  # ----------------------------------

  dev:
    desc: Start dev server
    cmds:
      - task: db
      - air
      - echo "✅ All services running."

  build:
    desc: Build app
    cmds:
      - go build -o ./iwifunni ./cmd/iwifunni/main.go
      - echo "✅ All services running."

  db:
    desc: Start Dockerized DB + Redis
    cmds:
      - docker compose up -d
      - echo "✅ Postgres and Redis are up."

  lint:
    desc: Lint backend
    cmds:
      - golangci-lint run
      - echo "✅ Go linting completed."

  swagger:
    desc: Generate Swagger docs
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - swag init --output docs --generalInfo cmd/zendo/main.go
      - echo "✅ Swagger docs generated."

  sqlc:
    desc: Generate sqlc queries
    cmds:
      - sqlc generate
      - echo "✅ Sqlc queries generated."

  # ----------------------------------
  # Migrations
  # ----------------------------------

  migrate:up:
    desc: Apply all pending migrations
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_URL}}" up

  migrate:down:
    desc: Rollback last migration
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_URL}}" down

  migrate:status:
    desc: Show migration status
    cmds:
      - goose -dir {{.MIGRATIONS_DIR}} postgres "{{.DB_URL}}" status

  migrate:new:
    desc: Create a new migration
    interactive: true
    cmds:
      - |
        read -p "Migration name: " name
        goose -dir {{.MIGRATIONS_DIR}} create "$name" sql

  # ----------------------------------
  # Tools
  # ----------------------------------

  tools:
    desc: Install dev tools
    cmds:
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
      - go install github.com/pressly/goose/v3/cmd/goose@latest
      - go install github.com/air-verse/air@latest
      - echo "✅ Dev tools installed."

  # ----------------------------------
  # Help
  # ----------------------------------

  help:
    desc: Show available tasks
    cmds:
      - task --list
